name: Release

# Fires when a v* tag is pushed. The tag's name must match the version in
# package.json — the verify step bails out otherwise so the wrong version
# can't accidentally ship.
#
# Auth is npm Trusted Publishing (OIDC): npmjs.com is configured to trust this
# exact repo + workflow file, so no NPM_TOKEN secret exists anywhere. Requires
# npm >= 11.5 (upgraded below; Node 22 bundles 10.x) and id-token: write.
# Provenance attestation is automatic on the OIDC path.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for the OIDC token exchange with npmjs.com (and provenance).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No registry-url here on purpose: setup-node would write an .npmrc
      # referencing $NODE_AUTH_TOKEN, which breaks the tokenless OIDC publish.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches package.json version"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
